services:
  mysql:
    image: mysql:8.0
    container_name: medical-billing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_billing_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - medical-billing-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: medical-billing-system:latest
    container_name: medical-billing-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/medical_billing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_JWT_SECRET: MedicalBillingSystemSecretKey2024EnterpriseLevelSecurityKeyForJWTTokenGeneration
    volumes:
      - app_uploads:/app/uploads
      - app_backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - medical-billing-net

volumes:
  mysql_data:
  app_uploads:
  app_backups:

networks:
  medical-billing-net:
    driver: bridge
