services:
  app:
    build: .
    image: medical-billing-system-go:1.1.0
    container_name: medical-billing-go
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-32chars}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      APP_PHARMACIST_PASSWORD: ${APP_PHARMACIST_PASSWORD:-pharma123}
      APP_CASHIER_PASSWORD: ${APP_CASHIER_PASSWORD:-cashier123}
      DB_DRIVER: sqlite
      DB_DSN: data/medical_billing.db
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
      - app_backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app_data:
  app_uploads:
  app_backups:
