server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET}
app.upload.dir=/app/uploads
app.backup.dir=/app/backups

app.seed.admin-password=${APP_ADMIN_PASSWORD:admin123}
app.seed.pharmacist-password=${APP_PHARMACIST_PASSWORD:pharma123}
app.seed.cashier-password=${APP_CASHIER_PASSWORD:cashier123}

app.sms.api-key=${APP_SMS_API_KEY:}
app.whatsapp.api-token=${APP_WHATSAPP_API_TOKEN:}

app.low-stock.notify.enabled=${APP_LOW_STOCK_NOTIFY_ENABLED:true}
app.low-stock.threshold=${APP_LOW_STOCK_THRESHOLD:10}

app.near-expiry.days=${APP_NEAR_EXPIRY_DAYS:30}

spring.jpa.defer-datasource-initialization=false

# Retry database connection while MySQL starts
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10

logging.level.com.medicalbilling=INFO
