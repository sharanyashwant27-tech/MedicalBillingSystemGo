spring.application.name=MedicalBillingSystem
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/medical_billing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT (required — set APP_JWT_SECRET in environment or .env, never in URLs)
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=86400000

# Mail (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application
app.upload.dir=uploads
app.backup.dir=backups

# Seed users (set via environment variables — never put passwords in URLs or commit real values)
app.seed.admin-password=${APP_ADMIN_PASSWORD:}
app.seed.pharmacist-password=${APP_PHARMACIST_PASSWORD:}
app.seed.cashier-password=${APP_CASHIER_PASSWORD:}

# SMS Notifications
app.sms.enabled=false
app.sms.api-url=
app.sms.api-key=${APP_SMS_API_KEY:}
app.sms.sender-id=MEDBILL

# WhatsApp Integration
app.whatsapp.enabled=false
app.whatsapp.api-url=
app.whatsapp.api-token=${APP_WHATSAPP_API_TOKEN:}

# Accounting Integration
app.accounting.enabled=true

# Logging
logging.level.com.medicalbilling=INFO
logging.level.org.springframework.security=WARN

# Error responses — never expose stack traces, messages, or URL query strings
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never
