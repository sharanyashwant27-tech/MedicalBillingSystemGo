spring.application.name=MedicalBillingSystem
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/medical_billing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=MedicalBillingSystemSecretKey2024EnterpriseLevelSecurityKeyForJWTTokenGeneration
app.jwt.expiration-ms=86400000

# Mail (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application
app.upload.dir=uploads
app.backup.dir=backups

# SMS Notifications
app.sms.enabled=false
app.sms.api-url=
app.sms.api-key=
app.sms.sender-id=MEDBILL

# WhatsApp Integration
app.whatsapp.enabled=false
app.whatsapp.api-url=
app.whatsapp.api-token=

# Accounting Integration
app.accounting.enabled=true

# Logging
logging.level.com.medicalbilling=INFO
logging.level.org.springframework.security=WARN
