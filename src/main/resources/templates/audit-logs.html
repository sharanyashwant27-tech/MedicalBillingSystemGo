<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Audit Logs')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="card">
                <div class="card-header"><h5><i class="bi bi-shield-check"></i> Activity & Audit Logs</h5></div>
                <div class="card-body table-responsive">
                    <table class="table table-sm table-hover">
                        <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th><th>IP</th></tr></thead>
                        <tbody>
                        <tr th:each="log : ${logs}">
                            <td th:text="${#temporals.format(log.timestamp, 'dd-MM-yyyy HH:mm:ss')}"></td>
                            <td th:text="${log.username}"></td>
                            <td><span class="badge bg-primary" th:text="${log.action}"></span></td>
                            <td th:text="${log.entityType} + ' #' + ${log.entityId}"></td>
                            <td th:text="${log.details}" class="small"></td>
                            <td th:text="${log.ipAddress}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
