<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Billing')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5><i class="bi bi-search"></i> Search Medicine</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-success me-1" id="barcodeScanBtn"><i class="bi bi-upc-scan"></i> Scan Barcode/QR</button>
                                <button class="btn btn-sm btn-outline-primary" id="voiceBillingBtn"><i class="bi bi-mic"></i> Voice</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="qrReader" style="display:none;max-width:400px;" class="mb-3"></div>
                            <div id="voiceStatus" class="alert alert-info py-1 small" style="display:none;"></div>
                            <input type="text" class="form-control mb-3" id="medicineSearch" placeholder="Search by name, barcode, or batch...">
                            <div id="searchResults" class="search-results"></div>
                        </div>
                    </div>
                    <div class="card mt-4">
                        <div class="card-header"><h5><i class="bi bi-cart3"></i> Cart</h5></div>
                        <div class="card-body table-responsive">
                            <table class="table" id="cartTable">
                                <thead><tr><th>Medicine</th><th>Batch</th><th>Qty</th><th>Price</th><th>Disc%</th><th>GST</th><th>Subtotal</th><th></th></tr></thead>
                                <tbody id="cartBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="card billing-summary">
                        <div class="card-header"><h5><i class="bi bi-receipt"></i> Bill Summary</h5></div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Customer</label>
                                <select class="form-select" id="customerSelect">
                                    <option value="">Walk-in Customer</option>
                                    <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.customerName}"></option>
                                </select>
                            </div>
                            <div class="summary-row"><span>Subtotal:</span><span id="subtotal">₹0.00</span></div>
                            <div class="summary-row"><span>Discount:</span><span id="discount">₹0.00</span></div>
                            <div class="summary-row"><span>GST:</span><span id="gst">₹0.00</span></div>
                            <div class="summary-row grand-total"><span>Grand Total:</span><span id="grandTotal">₹0.00</span></div>
                            <hr>
                            <div class="mb-3">
                                <label class="form-label">Payment Mode</label>
                                <div class="payment-modes">
                                    <button class="btn btn-outline-success payment-btn active" data-mode="CASH">Cash</button>
                                    <button class="btn btn-outline-success payment-btn" data-mode="CARD">Card</button>
                                    <button class="btn btn-outline-success payment-btn" data-mode="UPI">UPI</button>
                                    <button class="btn btn-outline-success payment-btn" data-mode="CREDIT">Credit</button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Amount Paid</label>
                                <input type="number" class="form-control" id="amountPaid" step="0.01">
                            </div>
                            <div class="summary-row"><span>Return Money:</span><span id="returnMoney">₹0.00</span></div>
                            <div class="d-grid gap-2 mt-3">
                                <button class="btn btn-success btn-lg" id="generateBillBtn"><i class="bi bi-check-circle"></i> Generate Bill</button>
                                <button class="btn btn-outline-success" id="printReceiptBtn" disabled><i class="bi bi-printer"></i> Print Receipt</button>
                                <button class="btn btn-outline-success" id="whatsappBtn" disabled><i class="bi bi-whatsapp"></i> WhatsApp Invoice</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/billing.js}"></script>
</body>
</html>
