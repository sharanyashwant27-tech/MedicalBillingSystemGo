<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Branches')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="d-flex justify-content-end mb-4">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#branchModal"><i class="bi bi-plus-circle"></i> Add Branch</button>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Code</th><th>Name</th><th>City</th><th>Phone</th><th>Email</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:each="b : ${branches}">
                            <td th:text="${b.branchCode}"></td>
                            <td th:text="${b.branchName}"></td>
                            <td th:text="${b.city}"></td>
                            <td th:text="${b.phone}"></td>
                            <td th:text="${b.email}"></td>
                            <td><span class="badge" th:classappend="${b.active} ? 'bg-success' : 'bg-secondary'" th:text="${b.active} ? 'Active' : 'Inactive'"></span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<div class="modal fade" id="branchModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5>Add Branch</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="mb-3"><label class="form-label">Code</label><input type="text" class="form-control" id="branchCode"></div>
            <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" id="branchName"></div>
            <div class="mb-3"><label class="form-label">Address</label><textarea class="form-control" id="branchAddress"></textarea></div>
            <div class="row g-2">
                <div class="col-6"><input type="text" class="form-control" id="branchCity" placeholder="City"></div>
                <div class="col-6"><input type="text" class="form-control" id="branchPhone" placeholder="Phone"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-success" onclick="saveBranch()">Save</button>
        </div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/branches.js}"></script>
</body>
</html>
