<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Customers')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="d-flex justify-content-between mb-4">
                <input type="text" class="form-control w-50" placeholder="Search customers...">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#customerModal" onclick="openCustomerModal()"><i class="bi bi-plus-circle"></i> Add Customer</button>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Age</th><th>Loyalty Pts</th><th>Gender</th><th>Doctor</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="c : ${customers}">
                            <td th:text="${c.customerName}"></td>
                            <td th:text="${c.phone}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.age}"></td>
                            <td><span class="badge bg-success" th:text="${c.loyaltyPoints} ?: 0"></span></td>
                            <td th:text="${c.gender}"></td>
                            <td th:text="${c.doctorName}"></td>
                            <td>
                                <button class="btn btn-sm btn-outline-info" th:onclick="'viewHistory(' + ${c.id} + ')'"><i class="bi bi-clock-history"></i></button>
                                <button class="btn btn-sm btn-outline-primary" th:onclick="'editCustomer(' + ${c.id} + ')'"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteCustomer(' + ${c.id} + ')'"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Customer</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="customerId">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name *</label><input type="text" class="form-control" id="customerName" required></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input type="text" class="form-control" id="phone"></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="email"></div>
                <div class="col-md-3"><label class="form-label">Age</label><input type="number" class="form-control" id="age"></div>
                <div class="col-md-3"><label class="form-label">Gender</label>
                    <select class="form-select" id="gender"><option value="">Select</option><option value="MALE">Male</option><option value="FEMALE">Female</option><option value="OTHER">Other</option></select>
                </div>
                <div class="col-md-6"><label class="form-label">Doctor Name</label><input type="text" class="form-control" id="doctorName"></div>
                <div class="col-md-6"><label class="form-label">GST Number</label><input type="text" class="form-control" id="gstNumber"></div>
                <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" id="address"></textarea></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-success" onclick="saveCustomer()">Save</button>
        </div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/customers.js}"></script>
</body>
</html>
