<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Forgot Password')}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card animate-fade-in">
        <div class="login-header">
            <i class="bi bi-key-fill text-success" style="font-size: 3rem;"></i>
            <h2>Forgot Password</h2>
            <p class="text-muted">Contact your system administrator to reset your password.</p>
        </div>
        <a th:href="@{/login}" class="btn btn-success w-100"><i class="bi bi-arrow-left"></i> Back to Login</a>
    </div>
</div>
</body>
</html>
