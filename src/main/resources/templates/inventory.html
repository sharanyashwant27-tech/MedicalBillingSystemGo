<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Inventory')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="row g-4 mb-4">
                <div class="col-md-2"><div class="stat-card"><h6>Total</h6><h3 th:text="${inventory.totalMedicines}">0</h3></div></div>
                <div class="col-md-2"><div class="stat-card card-alert"><h6>Low Stock (&lt;10)</h6><h3 th:text="${inventory.lowStock}">0</h3></div></div>
                <div class="col-md-2"><div class="stat-card card-expired"><h6>Out of Stock</h6><h3 th:text="${inventory.outOfStock}">0</h3></div></div>
                <div class="col-md-2"><div class="stat-card"><h6>Near Expiry</h6><h3 th:text="${inventory.nearExpiry}">0</h3></div></div>
                <div class="col-md-2"><div class="stat-card card-expired"><h6>Expired</h6><h3 th:text="${inventory.expired}">0</h3></div></div>
                <div class="col-md-2"><div class="stat-card card-profit"><h6>Valuation</h6><h3 th:text="'₹' + ${inventory.valuation}">₹0</h3></div></div>
            </div>
            <div class="btn-group mb-4">
                <a th:href="@{/inventory}" class="btn btn-outline-success">All</a>
                <a th:href="@{/inventory(filter='LOW_STOCK')}" class="btn btn-outline-warning">Low Stock</a>
                <a th:href="@{/inventory(filter='OUT_OF_STOCK')}" class="btn btn-outline-danger">Out of Stock</a>
                <a th:href="@{/inventory(filter='NEAR_EXPIRY')}" class="btn btn-outline-info">Near Expiry</a>
                <a th:href="@{/inventory(filter='EXPIRED')}" class="btn btn-outline-dark">Expired</a>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Code</th><th>Name</th><th>Batch</th><th>Expiry</th><th>Stock</th><th>Min Stock</th><th>Value</th></tr></thead>
                        <tbody>
                        <tr th:each="m : ${inventory.items}">
                            <td th:text="${m.medicineCode}"></td>
                            <td th:text="${m.medicineName}"></td>
                            <td th:text="${m.batchNumber}"></td>
                            <td th:text="${m.expiryDate}"></td>
                            <td th:text="${m.currentStock}"
                                th:class="${m.currentStock != null and m.currentStock == 0 ? 'text-danger fw-bold' : (m.currentStock != null and m.currentStock > 0 and m.currentStock < 10 ? 'text-warning fw-bold' : '')}"></td>
                            <td th:text="${m.minimumStock}"></td>
                            <td th:with="stock=${m.currentStock != null ? m.currentStock : 0},
                                         lineValue=${m.purchasePrice != null ? m.purchasePrice.multiply(new java.math.BigDecimal(stock)) : new java.math.BigDecimal(0)}"
                                th:text="|₹${lineValue}|"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
