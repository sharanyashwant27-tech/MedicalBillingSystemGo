<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - Medical Billing System')}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card animate-fade-in">
        <div class="login-header">
            <a th:href="@{/dashboard}" class="login-brand" title="MediBill Dashboard">
                <img th:src="@{/images/medibill-logo.svg}" alt="MediBill" class="brand-logo" width="72" height="72">
                <h2 class="brand-title">MediBill</h2>
            </a>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <div th:if="${error}" class="alert alert-danger animate-shake" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/login}" method="post" class="login-form">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                    <button type="button" class="btn btn-outline-secondary" id="togglePassword" title="Show password" aria-label="Show password">
                        <i class="bi bi-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-login w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <div class="login-footer">
            <a th:href="@{/forgot-password}" class="forgot-link">Forgot Password?</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const togglePasswordIcon = document.getElementById('togglePasswordIcon');

    togglePassword.addEventListener('click', () => {
        const show = passwordInput.type === 'password';
        passwordInput.type = show ? 'text' : 'password';
        togglePasswordIcon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        togglePassword.title = show ? 'Hide password' : 'Show password';
        togglePassword.setAttribute('aria-label', togglePassword.title);
    });
</script>
</body>
</html>
