<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Logged Out - Medical Billing System')}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card animate-fade-in">
        <div class="login-header">
            <div class="login-logo">
                <i class="bi bi-check-circle-fill text-success"></i>
            </div>
            <h2>Logged Out Successfully</h2>
            <p class="text-muted">You have been signed out of your account.</p>
        </div>

        <div class="alert alert-success mb-4">
            <i class="bi bi-shield-check"></i> Your session has ended securely.
        </div>

        <a th:href="@{/login}" class="btn btn-success w-100">
            <i class="bi bi-box-arrow-in-right"></i> Go to Login
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
