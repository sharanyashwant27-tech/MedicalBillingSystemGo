<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Medicines')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="d-flex justify-content-between mb-4">
                <input type="text" class="form-control w-50" id="searchInput" placeholder="Search medicines...">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#medicineModal" onclick="openMedicineModal()">
                    <i class="bi bi-plus-circle"></i> Add Medicine
                </button>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover" id="medicinesTable">
                        <thead>
                        <tr>
                            <th>Code</th><th>Name</th><th>Category</th><th>Batch</th><th>Expiry</th>
                            <th>P.Price</th><th>S.Price</th><th>Stock</th><th>Status</th><th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m : ${medicines}">
                            <td th:text="${m.medicineCode}"></td>
                            <td th:text="${m.medicineName}"></td>
                            <td th:text="${m.categoryName}"></td>
                            <td th:text="${m.batchNumber}"></td>
                            <td th:text="${m.expiryDate}"></td>
                            <td th:text="'₹' + ${m.purchasePrice}"></td>
                            <td th:text="'₹' + ${m.sellingPrice}"></td>
                            <td th:text="${m.currentStock}" th:class="${m.currentStock <= m.minimumStock} ? 'text-danger fw-bold' : ''"></td>
                            <td><span class="badge bg-success" th:text="${m.status}"></span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" th:onclick="'editMedicine(' + ${m.id} + ')'"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteMedicine(' + ${m.id} + ')'"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>

<!-- Medicine Modal -->
<div class="modal fade" id="medicineModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Medicine</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="medicineForm">
                    <input type="hidden" id="medicineId">
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Code</label><input type="text" class="form-control" id="medicineCode"></div>
                        <div class="col-md-8"><label class="form-label">Name *</label><input type="text" class="form-control" id="medicineName" required></div>
                        <div class="col-md-4"><label class="form-label">Category</label>
                            <select class="form-select" id="categoryId">
                                <option value="">Select</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Brand</label><input type="text" class="form-control" id="brand"></div>
                        <div class="col-md-4"><label class="form-label">Barcode</label><input type="text" class="form-control" id="barcode"></div>
                        <div class="col-md-4"><label class="form-label">Batch</label><input type="text" class="form-control" id="batchNumber"></div>
                        <div class="col-md-4"><label class="form-label">Expiry</label><input type="date" class="form-control" id="expiryDate"></div>
                        <div class="col-md-4"><label class="form-label">Mfg Date</label><input type="date" class="form-control" id="manufacturingDate"></div>
                        <div class="col-md-3"><label class="form-label">HSN</label><input type="text" class="form-control" id="hsnCode"></div>
                        <div class="col-md-3"><label class="form-label">GST %</label><input type="number" class="form-control" id="gstPercent" step="0.01"></div>
                        <div class="col-md-3"><label class="form-label">Purchase Price *</label><input type="number" class="form-control" id="purchasePrice" step="0.01" required></div>
                        <div class="col-md-3"><label class="form-label">Selling Price *</label><input type="number" class="form-control" id="sellingPrice" step="0.01" required></div>
                        <div class="col-md-3"><label class="form-label">MRP</label><input type="number" class="form-control" id="mrp" step="0.01"></div>
                        <div class="col-md-3"><label class="form-label">Discount %</label><input type="number" class="form-control" id="discountPercent" step="0.01"></div>
                        <div class="col-md-3"><label class="form-label">Min Stock</label><input type="number" class="form-control" id="minimumStock"></div>
                        <div class="col-md-3"><label class="form-label">Current Stock</label><input type="number" class="form-control" id="currentStock"></div>
                        <div class="col-md-4"><label class="form-label">Rack</label><input type="text" class="form-control" id="rackNumber"></div>
                        <div class="col-md-4"><label class="form-label">Supplier</label>
                            <select class="form-select" id="supplierId">
                                <option value="">Select</option>
                                <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.supplierName}"></option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" onclick="saveMedicine()">Save</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/medicines.js}"></script>
</body>
</html>
