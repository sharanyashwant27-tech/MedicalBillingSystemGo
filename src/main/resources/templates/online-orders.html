<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Online Orders')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="card">
                <div class="card-header d-flex justify-content-between">
                    <h5><i class="bi bi-cart-check"></i> Online Orders</h5>
                    <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#orderModal">New Order</button>
                </div>
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Order #</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="o : ${orders}">
                            <td th:text="${o.orderNumber}"></td>
                            <td th:text="${o.customer.customerName}"></td>
                            <td th:text="'₹' + ${o.totalAmount}"></td>
                            <td><span class="badge bg-info" th:text="${o.status}"></span></td>
                            <td th:text="${#temporals.format(o.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                            <td>
                                <button class="btn btn-sm btn-outline-success" th:onclick="'updateStatus(' + ${o.id} + ',\'CONFIRMED\')'">Confirm</button>
                                <button class="btn btn-sm btn-outline-primary" th:onclick="'updateStatus(' + ${o.id} + ',\'DELIVERED\')'">Deliver</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/online-orders.js}"></script>
</body>
</html>
