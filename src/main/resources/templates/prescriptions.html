<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Prescriptions')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="card">
                <div class="card-header"><h5><i class="bi bi-file-medical"></i> Upload Prescription</h5></div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Customer *</label>
                            <select class="form-select" id="customerId" required>
                                <option value="">Select Customer</option>
                                <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.customerName}"></option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Prescription Image *</label><input type="file" class="form-control" id="prescriptionFile" accept="image/*,.pdf" required></div>
                        <div class="col-md-4"><label class="form-label">Notes</label><input type="text" class="form-control" id="notes"></div>
                        <div class="col-12"><button class="btn btn-success" onclick="uploadPrescription()"><i class="bi bi-upload"></i> Upload</button></div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/prescriptions.js}"></script>
</body>
</html>
