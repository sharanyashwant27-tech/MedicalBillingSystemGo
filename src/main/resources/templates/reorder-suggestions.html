<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('AI Reorder Suggestions')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="alert alert-info"><i class="bi bi-robot"></i> AI-powered reorder suggestions based on sales velocity, stock levels, and expiry analysis.</div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Priority</th><th>Medicine</th><th>Stock</th><th>Monthly Sales</th><th>Days Left</th><th>Suggested Qty</th><th>Est. Cost</th><th>Supplier</th><th>Reason</th></tr></thead>
                        <tbody>
                        <tr th:each="s : ${suggestions}">
                            <td><span class="badge" th:classappend="${s.priority == 'CRITICAL'} ? 'bg-danger' : (${s.priority == 'HIGH'} ? 'bg-warning' : 'bg-info')" th:text="${s.priority}"></span></td>
                            <td th:text="${s.medicineName}"></td>
                            <td th:text="${s.currentStock}"></td>
                            <td th:text="${s.monthlySales}"></td>
                            <td th:text="${s.daysOfStockRemaining}"></td>
                            <td th:text="${s.suggestedReorderQty}" class="fw-bold"></td>
                            <td th:text="'₹' + ${s.estimatedCost}"></td>
                            <td th:text="${s.supplierName}"></td>
                            <td th:text="${s.reason}" class="small"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(suggestions)}"><td colspan="9" class="text-center text-muted">All stock levels are healthy</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
