<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Suppliers')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="d-flex justify-content-between mb-4">
                <input type="text" class="form-control w-50" placeholder="Search suppliers...">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#supplierModal" onclick="openSupplierModal()"><i class="bi bi-plus-circle"></i> Add Supplier</button>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Name</th><th>GST</th><th>Contact</th><th>Phone</th><th>Email</th><th>Outstanding</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="s : ${suppliers}">
                            <td th:text="${s.supplierName}"></td>
                            <td th:text="${s.gstNumber}"></td>
                            <td th:text="${s.contactPerson}"></td>
                            <td th:text="${s.phone}"></td>
                            <td th:text="${s.email}"></td>
                            <td th:text="'₹' + ${s.outstandingBalance}"></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" th:onclick="'editSupplier(' + ${s.id} + ')'"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteSupplier(' + ${s.id} + ')'"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<div class="modal fade" id="supplierModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Supplier</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="supplierId">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name *</label><input type="text" class="form-control" id="supplierName" required></div>
                <div class="col-md-6"><label class="form-label">GST Number</label><input type="text" class="form-control" id="gstNumber"></div>
                <div class="col-md-6"><label class="form-label">Contact Person</label><input type="text" class="form-control" id="contactPerson"></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input type="text" class="form-control" id="phone"></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="email"></div>
                <div class="col-md-6"><label class="form-label">State</label><input type="text" class="form-control" id="state"></div>
                <div class="col-md-8"><label class="form-label">Address</label><textarea class="form-control" id="address"></textarea></div>
                <div class="col-md-4"><label class="form-label">PIN Code</label><input type="text" class="form-control" id="pinCode"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-success" onclick="saveSupplier()">Save</button>
        </div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/suppliers.js}"></script>
</body>
</html>
