<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('User Management')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: navbar}"></header>
        <div class="content-area">
            <div class="d-flex justify-content-end mb-4">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openUserModal()"><i class="bi bi-person-plus"></i> Add User</button>
            </div>
            <div class="card">
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Username</th><th>Full Name</th><th>Email</th><th>Roles</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.username}"></td>
                            <td th:text="${u.fullName}"></td>
                            <td th:text="${u.email}"></td>
                            <td><span th:each="r : ${u.roles}" class="badge bg-success me-1" th:text="${r}"></span></td>
                            <td>
                                <span th:if="${u.enabled && u.accountNonLocked}" class="badge bg-success">Active</span>
                                <span th:if="${!u.accountNonLocked}" class="badge bg-danger">Locked</span>
                            </td>
                            <td>
                                <button type="button" class="btn btn-sm btn-outline-warning lock-user-btn" th:if="${u.accountNonLocked}"
                                        th:data-user-id="${u.id}"><i class="bi bi-lock"></i></button>
                                <button type="button" class="btn btn-sm btn-outline-success unlock-user-btn" th:if="${!u.accountNonLocked}"
                                        th:data-user-id="${u.id}"><i class="bi bi-unlock"></i></button>
                                <button type="button" class="btn btn-sm btn-outline-primary reset-password-btn"
                                        th:data-user-id="${u.id}"><i class="bi bi-key"></i></button>
                                <button type="button" class="btn btn-sm btn-outline-danger delete-user-btn" th:if="${u.username != 'admin'}"
                                        th:data-user-id="${u.id}"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</div>
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="userId">
            <div class="mb-3"><label class="form-label">Username *</label><input type="text" class="form-control" id="username" required></div>
            <div class="mb-3"><label class="form-label">Password *</label><input type="password" class="form-control" id="password"></div>
            <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" class="form-control" id="fullName" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email"></div>
            <div class="mb-3"><label class="form-label">Role *</label>
                <select class="form-select" id="role"><option value="ROLE_ADMIN">Admin</option><option value="ROLE_PHARMACIST">Pharmacist</option><option value="ROLE_CASHIER">Cashier</option></select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-success" onclick="saveUser()">Save</button>
        </div>
    </div></div>
</div>
<div class="modal fade" id="resetPasswordModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Reset Password</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="resetUserId">
            <div class="mb-3">
                <label class="form-label">New Password *</label>
                <input type="password" class="form-control" id="newPassword" required autocomplete="new-password">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-success" onclick="submitResetPassword()">Reset</button>
        </div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/users.js}"></script>
</body>
</html>
