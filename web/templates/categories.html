{{define "categories.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Categories")}}</head>
<body>
<div class="app-wrapper">{{template "sidebar" .}}<div class="main-content">{{template "navbar" .}}<div class="content-area">
<div class="d-flex justify-content-between mb-4">
<input type="text" class="form-control w-50" id="searchInput" placeholder="Search categories...">
<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#categoryModal"><i class="bi bi-plus-circle"></i> Add Category</button>
</div>
<div class="card"><div class="card-body table-responsive">
<table class="table table-hover"><thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
<tbody>{{range .Categories}}<tr>
<td>{{.ID}}</td><td>{{.Name}}</td><td>{{.Description}}</td>
<td>
<button type="button" class="btn btn-sm btn-outline-primary edit-category-btn" data-id="{{.ID}}" data-name="{{.Name}}" data-description="{{.Description}}"><i class="bi bi-pencil"></i></button>
<button type="button" class="btn btn-sm btn-outline-danger delete-category-btn" data-id="{{.ID}}"><i class="bi bi-trash"></i></button>
</td></tr>{{end}}</tbody></table></div></div>
</div>{{template "footer" .}}</div></div>
<div class="modal fade" id="categoryModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title">Category</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body"><input type="hidden" id="categoryId">
<div class="mb-3"><label class="form-label">Name *</label><input type="text" class="form-control" id="categoryName" required></div>
<div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" id="categoryDesc"></textarea></div>
</div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="saveCategory()">Save</button></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script><script src="/js/categories.js"></script>
</body></html>
{{end}}
