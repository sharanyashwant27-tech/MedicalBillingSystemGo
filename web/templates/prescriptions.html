{{define "prescriptions.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Prescriptions")}}</head>
<body>
<div class="app-wrapper">
{{template "sidebar" .}}
<div class="main-content">
{{template "navbar" .}}
<div class="content-area">
<div class="card">
<div class="card-header"><h5><i class="bi bi-file-medical"></i> Upload Prescription</h5></div>
<div class="card-body">
<div class="row g-3">
<div class="col-md-4"><label class="form-label">Customer *</label>
<select class="form-select" id="customerId" required>
<option value="">Select Customer</option>
{{range .Customers}}<option value="{{.ID}}">{{.CustomerName}}</option>{{end}}
</select></div>
<div class="col-md-4"><label class="form-label">Prescription Image *</label><input type="file" class="form-control" id="prescriptionFile" accept="image/*,.pdf" required></div>
<div class="col-md-4"><label class="form-label">Notes</label><input type="text" class="form-control" id="notes"></div>
<div class="col-12"><button class="btn btn-success" onclick="uploadPrescription()"><i class="bi bi-upload"></i> Upload</button></div>
</div></div></div>
</div>
{{template "footer" .}}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script src="/js/prescriptions.js"></script>
</body></html>
{{end}}
