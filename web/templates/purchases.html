{{define "purchases.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Purchases")}}</head>
<body>
<div class="app-wrapper">
{{template "sidebar" .}}
<div class="main-content">
{{template "navbar" .}}
<div class="content-area">
<div class="card">
<div class="card-header"><h5><i class="bi bi-bag-plus"></i> New Purchase</h5></div>
<div class="card-body">
<div class="row g-3 mb-4">
<div class="col-md-4"><label class="form-label">Invoice Number</label><input type="text" class="form-control" id="invoiceNumber"></div>
<div class="col-md-4"><label class="form-label">Supplier *</label>
<select class="form-select" id="supplierId" required>
<option value="">Select Supplier</option>
{{range .Suppliers}}<option value="{{.ID}}">{{.SupplierName}}</option>{{end}}
</select></div>
<div class="col-md-4"><label class="form-label">Purchase Date *</label><input type="date" class="form-control" id="purchaseDate" required></div>
</div>
<h6>Purchase Items</h6>
<div class="row g-2 mb-2" id="purchaseItemForm">
<div class="col-md-3"><select class="form-select" id="itemMedicineId"><option value="">Medicine</option>
{{range .Medicines}}<option value="{{.ID}}">{{.MedicineName}}</option>{{end}}</select></div>
<div class="col-md-2"><input type="number" class="form-control" id="itemQuantity" placeholder="Qty" min="1"></div>
<div class="col-md-2"><input type="number" class="form-control" id="itemPrice" placeholder="Price" step="0.01"></div>
<div class="col-md-2"><input type="date" class="form-control" id="itemExpiry" placeholder="Expiry"></div>
<div class="col-md-2"><input type="text" class="form-control" id="itemBatch" placeholder="Batch"></div>
<div class="col-md-1"><button class="btn btn-success w-100" onclick="addPurchaseItem()"><i class="bi bi-plus"></i></button></div>
</div>
<table class="table" id="purchaseItemsTable">
<thead><tr><th>Medicine</th><th>Qty</th><th>Price</th><th>Expiry</th><th>Batch</th><th></th></tr></thead>
<tbody id="purchaseItemsBody"></tbody>
</table>
<button class="btn btn-success" onclick="savePurchase()"><i class="bi bi-save"></i> Save Purchase</button>
</div></div>
</div>
{{template "footer" .}}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script src="/js/purchases.js"></script>
</body></html>
{{end}}
