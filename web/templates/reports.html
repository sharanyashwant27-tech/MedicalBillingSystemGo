{{define "reports.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Reports")}}</head>
<body>
<div class="app-wrapper">
{{template "sidebar" .}}
<div class="main-content">
{{template "navbar" .}}
<div class="content-area">
<div class="card">
<div class="card-header"><h5><i class="bi bi-file-earmark-bar-graph"></i> Generate Report</h5></div>
<div class="card-body">
<div class="row g-3">
<div class="col-md-4">
<label class="form-label">Report Type</label>
<select class="form-select" id="reportType">
<option value="SALES">Daily/Monthly/Yearly Sales</option>
<option value="PURCHASE">Purchase Report</option>
<option value="PROFIT">Profit Report</option>
<option value="GST">GST Report</option>
<option value="MEDICINE">Medicine Report</option>
<option value="CUSTOMER">Customer Report</option>
<option value="SUPPLIER">Supplier Report</option>
<option value="STOCK">Stock Report</option>
<option value="EXPIRY">Expiry Report</option>
</select>
</div>
<div class="col-md-3"><label class="form-label">Start Date</label><input type="date" class="form-control" id="startDate"></div>
<div class="col-md-3"><label class="form-label">End Date</label><input type="date" class="form-control" id="endDate"></div>
<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-success w-100" onclick="generateReport()"><i class="bi bi-search"></i> Generate</button>
</div>
</div>
<div class="mt-3">
<button class="btn btn-outline-success" onclick="exportReport('excel')"><i class="bi bi-file-earmark-excel"></i> Excel</button>
<button class="btn btn-outline-danger" onclick="exportReport('pdf')"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
<button class="btn btn-outline-primary" onclick="exportReport('csv')"><i class="bi bi-filetype-csv"></i> CSV</button>
</div>
<div id="reportResult" class="mt-4"></div>
</div></div>
</div>
{{template "footer" .}}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script src="/js/reports.js"></script>
</body></html>
{{end}}
