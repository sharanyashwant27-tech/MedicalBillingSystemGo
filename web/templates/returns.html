{{define "returns.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Returns")}}</head>
<body>
<div class="app-wrapper">
{{template "sidebar" .}}
<div class="main-content">
{{template "navbar" .}}
<div class="content-area">
<div class="card">
<div class="card-header"><h5><i class="bi bi-arrow-return-left"></i> Process Return</h5></div>
<div class="card-body">
<div class="row g-3">
<div class="col-md-4"><label class="form-label">Return Type</label>
<select class="form-select" id="returnType"><option value="SALES_RETURN">Sales Return</option><option value="PURCHASE_RETURN">Purchase Return</option></select>
</div>
<div class="col-md-4"><label class="form-label">Medicine *</label>
<select class="form-select" id="medicineId" required>
<option value="">Select</option>
{{range .Medicines}}<option value="{{.ID}}">{{.MedicineName}}</option>{{end}}
</select></div>
<div class="col-md-4"><label class="form-label">Quantity *</label><input type="number" class="form-control" id="quantity" min="1" required></div>
<div class="col-md-4"><label class="form-label">Sale ID (for sales return)</label><input type="number" class="form-control" id="saleId"></div>
<div class="col-md-4"><label class="form-label">Purchase ID (for purchase return)</label><input type="number" class="form-control" id="purchaseId"></div>
<div class="col-md-12"><label class="form-label">Reason *</label><textarea class="form-control" id="reason" required></textarea></div>
<div class="col-12"><button class="btn btn-success" onclick="processReturn()"><i class="bi bi-check-circle"></i> Process Return</button></div>
</div></div></div>
</div>
{{template "footer" .}}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script src="/js/returns.js"></script>
</body></html>
{{end}}
