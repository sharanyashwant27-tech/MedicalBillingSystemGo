{{define "settings.html"}}
<!DOCTYPE html>
<html>
<head>{{template "head" (dict "Title" "Settings")}}</head>
<body>
<div class="app-wrapper">
{{template "sidebar" .}}
<div class="main-content">
{{template "navbar" .}}
<div class="content-area">
<div class="row g-4">
<div class="col-lg-8">
<div class="card">
<div class="card-header"><h5><i class="bi bi-shop"></i> Shop Information</h5></div>
<div class="card-body">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Shop Name</label><input type="text" class="form-control" id="shopName" value="{{.Settings.ShopName}}"></div>
<div class="col-md-6"><label class="form-label">GST Number</label><input type="text" class="form-control" id="gstNumber" value="{{.Settings.GSTNumber}}"></div>
<div class="col-md-6"><label class="form-label">Phone</label><input type="text" class="form-control" id="phone" value="{{.Settings.Phone}}"></div>
<div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="email" value="{{.Settings.Email}}"></div>
<div class="col-12"><label class="form-label">Address</label><textarea class="form-control" id="address">{{.Settings.Address}}</textarea></div>
<div class="col-12"><label class="form-label">Invoice Footer</label><textarea class="form-control" id="invoiceFooter">{{.Settings.InvoiceFooter}}</textarea></div>
<div class="col-md-4"><label class="form-label">Default GST %</label><input type="number" class="form-control" id="defaultGstPercent" step="0.01" value="{{.Settings.DefaultGSTPercent}}"></div>
<div class="col-12"><button class="btn btn-success" onclick="saveSettings()"><i class="bi bi-save"></i> Save Settings</button></div>
</div></div></div>
</div>
<div class="col-lg-4">
<div class="card mb-4">
<div class="card-header"><h5><i class="bi bi-image"></i> Logo</h5></div>
<div class="card-body">
<input type="file" class="form-control mb-3" id="logoFile" accept="image/*">
<button class="btn btn-outline-success w-100" onclick="uploadLogo()"><i class="bi bi-upload"></i> Upload Logo</button>
</div></div>
<div class="card">
<div class="card-header"><h5><i class="bi bi-database"></i> Database</h5></div>
<div class="card-body">
<button class="btn btn-outline-primary w-100 mb-2" onclick="backupDatabase()"><i class="bi bi-download"></i> Backup Database</button>
</div></div>
</div>
</div>
</div>
{{template "footer" .}}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script src="/js/settings.js"></script>
</body></html>
{{end}}
